            padding: 14px 18px;

            border: 1px solid #3a4055;

            color: #eef2ff;
            font-size: 1rem;

        input:focus {
            border-color: #6c5ce7;
            background: #252c42;
        }
        button {
            flex: 1;
            background: #6c5ce7;
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        button:hover {
            background: #5b4bc4;
            transform: scale(0.98);
        }
        .result-area {
            padding: 24px;
        }
        .stats-card {
            background: #0f1219;
            border-radius: 20px;
            border: 1px solid #2a2f3f;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            font-family: 'Courier New', 'SF Mono', monospace;
        }
        th {
            text-align: left;
            padding: 16px 12px;
            background: #131724;
            color: #b9c3e8;
            font-weight: 600;
            border-bottom: 1px solid #2a2f3f;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #1e2436;
            color: #dce5ff;
        }
        .stat-label {
            font-weight: 600;
            color: #a5b4fc;
            width: 35%;
        }
        .stat-value {
            font-weight: 500;
            font-family: monospace;
        }
        .positive {
            color: #4ade80;
        }
        .negative {
            color: #f87171;
        }
        .alliance-change {
            color: #fbbf24;
        }
        .player-header {
            background: #131724;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2f3f;
        }
        .player-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #f0f3ff;
        }
        .player-header p {
            margin: 6px 0 0;
            color: #8b9bdc;
            font-size: 0.8rem;
        }
        .no-result {
            text-align: center;
            padding: 48px 20px;
            color: #9aa3c2;
            font-size: 1rem;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #4a5070;
            padding: 12px;
            border-top: 1px solid #1e2436;
        }
        .loading {
            text-align: center;
            padding: 48px;
            color: #9aa3c2;
        }

    function formatNumber(num) {
        return num.toLocaleString('it-IT');
    }

    function renderStats(player) {
        const deltaKps = player.kps31 - player.kps28;
        const deltaDeads = player.deads31 - player.deads28;
        const powerChange = player.powerDelta;
        
        const allianceDisplay = player.changedAlliance ? 
            `<span style="color:#fbbf24;">→ ${player.alliance31}</span>` : 
            `<span>${player.alliance31}</span>`;

        return `
            <div class="stats-card">
                <div class="player-header">
                    <h2>${player.name31} <span style="font-size:0.9rem; color:#6c5ce7;">(ID: ${player.id})</span></h2>
                    ${player.name28 !== player.name31 ? `<p>ex: ${player.name28}</p>` : ''}
                </div>
                <table>
                    <tr><td class="stat-label">Killpoints (28/03)</td><td class="stat-value">${formatNumber(player.kps28)}</td></tr>
                    <tr><td class="stat-label">Killpoints (31/03)</td><td class="stat-value">${formatNumber(player.kps31)}</td></tr>
                    <tr><td class="stat-label">Δ Killpoints</td><td class="stat-value ${deltaKps >= 0 ? 'positive' : 'negative'}">${deltaKps >= 0 ? '+' : ''}${formatNumber(deltaKps)}</td></tr>
                    <tr><td class="stat-label">Deads (28/03)</td><td class="stat-value">${formatNumber(player.deads28)}</td></tr>
                    <tr><td class="stat-label">Deads (31/03)</td><td class="stat-value">${formatNumber(player.deads31)}</td></tr>
                    <tr><td class="stat-label">Δ Deads</td><td class="stat-value ${deltaDeads <= 0 ? 'positive' : 'negative'}">${deltaDeads >= 0 ? '+' : ''}${formatNumber(deltaDeads)}</td></tr>
                    <tr><td class="stat-label">T4 Kills (Δ)</td><td class="stat-value positive">+${formatNumber(player.t4KillDelta)}</td></tr>
                    <tr><td class="stat-label">T5 Kills (Δ)</td><td class="stat-value positive">+${formatNumber(player.t5KillDelta)}</td></tr>
                    <tr><td class="stat-label">Alleanza (31/03)</td><td class="stat-value">${allianceDisplay}</td></tr>
                    <tr><td class="stat-label">Δ Power</td><td class="stat-value ${powerChange <= 0 ? 'negative' : 'positive'}">${powerChange >= 0 ? '+' : ''}${formatNumber(powerChange)}</td></tr>
                </table>
            </div>
        `;
    }

    function searchPlayer() {
        const input = document.getElementById('playerNameInput').value.trim();
        const resultDiv = document.getElementById('resultArea');
        
        if (input === "") {
            resultDiv.innerHTML = `<div class="stats-card"><div class="no-result">✦ Inserisci un nome o ID ✦</div></div>`;
            return;
        }

        const lowerInput = input.toLowerCase();
        const found = playersData.find(p => 
            p.id === input || 
            p.name28.toLowerCase() === lowerInput || 
            p.name31.toLowerCase() === lowerInput ||
            p.name28.toLowerCase().includes(lowerInput) ||
            p.name31.toLowerCase().includes(lowerInput)
        );

        if (found) {
            resultDiv.innerHTML = renderStats(found);
        } else {
            resultDiv.innerHTML = `<div class="stats-card"><div class="no-result">⚠️ Nessun giocatore trovato per "${escapeHtml(input)}"<br><span style="font-size:0.8rem;">Prova con ID, nome esatto o parte del nome</span></div></div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('searchBtn').addEventListener('click', searchPlayer);
    document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchPlayer();
    });
</script>
